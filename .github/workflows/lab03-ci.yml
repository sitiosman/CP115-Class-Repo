name: Lab 03 Tests

on:
  push:
    paths:
      - 'labs/lab03/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labs/lab03

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # --- Exercise 1 (worked example: files only, no test) ---
      - name: Exercise 1 - verify files exist
        run: |
          test -f exercise1/lab-03-1.fprg
          test -f exercise1/lab-03-1.py
        continue-on-error: true

      # --- Exercise 2 ---
      - name: Exercise 2 - verify files exist
        run: |
          test -f exercise2/lab-03-2.fprg
          test -f exercise2/lab-03-2.py
        continue-on-error: true
      - name: Exercise 2 - run tests
        run: python -m pytest exercise2/test/ -v
        continue-on-error: true

      # --- Exercise 3 ---
      - name: Exercise 3 - verify files exist
        run: |
          test -f exercise3/lab-03-3.fprg
          test -f exercise3/lab-03-3.py
        continue-on-error: true
      - name: Exercise 3 - run tests
        run: python -m pytest exercise3/test/ -v
        continue-on-error: true

      # --- Exercise 4 ---
